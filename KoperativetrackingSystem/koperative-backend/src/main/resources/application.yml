server:
  port: 8080

spring:
  application:
    name: koperative-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/koperative_db
    username: postgres
    password: auca123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# JWT Configuration
app:
  jwt:
    secret: koperative-rw-secret-key-2024-very-long-secret-for-hmac-sha256-minimum-256-bits
    expiration-ms: 86400000      # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

# CORS
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000

logging:
  level:
    rw.koperative: DEBUG
    org.springframework.security: DEBUG
